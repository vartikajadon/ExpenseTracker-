<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Assisted Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Application Container -->
    <div id="app" class="container">
        <header>
            <h1>AI-Assisted Expense Tracker</h1>
            <p class="subtitle">A simple tool to track and manage your daily spending.</p>
        </header>

        <section id="expense-form-section" class="app-section">
            <h2>Add New Expense</h2>
            <form id="expense-form">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Food & Drink">Food & Drink</option>
                        <option value="Transport">Transport</option>
                        <option value="Housing">Housing</option>
                        <option value="Health">Health</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Education">Education</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date*</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="note">Note (Optional)</label>
                    <textarea id="note" placeholder="What was this for?"></textarea>
                </div>

                <button type="submit" class="submit-btn">Add Expense</button>
            </form>
        </section>

        <section id="summary-section" class="app-section">
            <div class="summary-header">
                <h2>Financial Summary</h2>
                <div class="currency-selector">
                    <label for="currency-select">Currency:</label>
                    <select id="currency-select">
                        <option value="INR" selected>INR (₹)</option>
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                    </select>
                </div>
            </div>
            
            <div class="summary-card">
                <p>Total Spent</p>
                <h3 id="total-amount">₹0.00</h3>
            </div>
        </section>

        <!-- Expense List Section -->
        <section id="expense-list-section" class="app-section">
            <h2>Transaction History</h2>
            <div class="table-container">
                <table id="expense-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Note</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expense-list">
                        <!-- Dynamic list items will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="empty-state" class="hidden">
                <p class="placeholder-text">No expenses yet. Start adding some!</p>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 AI-Assisted Expense Tracker</p>
        </footer>
    </div>

    <!-- Application Script -->
    <script src="script.js"></script>
</body>
</html>
