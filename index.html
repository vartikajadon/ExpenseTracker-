<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Assisted Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Application Container -->
    <div id="app" class="container">
        <header>
            <h1>AI-Assisted Expense Tracker</h1>
            <p class="subtitle">A simple tool to track and manage your daily spending.</p>
        </header>

        <!-- Expense Form Section -->
        <section id="expense-form-section" class="app-section">
            <h2>Add New Expense</h2>
            <div id="expense-form-placeholder">
                <!-- Form will be implemented here in future steps -->
                <p class="placeholder-text">Form section ready for features.</p>
            </div>
        </section>

        <!-- Expense Summary Section -->
        <section id="summary-section" class="app-section">
            <h2>Financial Summary</h2>
            <div id="summary-placeholder">
                <!-- Summary cards will be implemented here -->
                <p class="placeholder-text">Summary statistics ready for features.</p>
            </div>
        </section>

        <!-- Expense List Section -->
        <section id="expense-list-section" class="app-section">
            <h2>Transaction History</h2>
            <div id="expense-list-placeholder">
                <!-- Transaction list will be implemented here -->
                <p class="placeholder-text">Expense list ready for features.</p>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 AI-Assisted Expense Tracker</p>
        </footer>
    </div>

    <!-- Application Script -->
    <script src="script.js"></script>
</body>
</html>
